# goVLESS WebApp + JSON-RPC API snippet (Pro mode).
# Included from the existing Pro nginx server block via:
#   include /etc/nginx/snippets/govless-webapp.conf;
#
# Pro may terminate TLS directly in nginx, or Xray may terminate TLS on :443
# and fallback HTTP traffic to nginx :80. The locations below work in either
# server block.

# Preview-only design canvas. It intentionally uses React+Babel from unpkg and
# Google Fonts, so keep its wider CSP scoped away from the production Mini App.
location ^~ /app/design/ {
    alias /opt/govless/webapp/dist/design/;
    index index.html;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Cache-Control "no-store" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self' https://telegram.org https://*.telegram.org; img-src 'self' data: blob:; script-src 'self' https://telegram.org https://unpkg.com https://cdnjs.cloudflare.com 'unsafe-inline' 'unsafe-eval'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; frame-ancestors https://web.telegram.org https://*.telegram.org;" always;
}

# Static WebApp (vanilla HTML/JS, no build step).
location ^~ /app/ {
    alias /opt/govless/webapp/dist/;
    index index.html;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Cache-Control "no-store" always;
    # Telegram WebApp embeds us in an iframe; allow only Telegram.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self' https://telegram.org https://*.telegram.org; img-src 'self' data:; script-src 'self' https://telegram.org https://cdnjs.cloudflare.com; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src 'self' https://fonts.gstatic.com data:; connect-src 'self'; frame-ancestors https://web.telegram.org https://*.telegram.org;" always;
}

# JSON-RPC over UNIX socket — only POST /api/rpc reaches the daemon.
location = /api/rpc {
    if ($request_method != POST) { return 405; }
    proxy_pass http://unix:/run/govlessctl.sock:/rpc;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 30s;
    proxy_send_timeout 30s;
    proxy_connect_timeout 5s;
    client_max_body_size 64k;
}

# Health endpoint (used by tunnel-health probe + monitoring).
location = /api/healthz {
    proxy_pass http://unix:/run/govlessctl.sock:/healthz;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_read_timeout 5s;
    proxy_connect_timeout 2s;
    access_log off;
}
